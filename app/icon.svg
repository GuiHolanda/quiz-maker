<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#4f46e5"/>

  <!-- C arc: outer R=28, inner R=18, gap ±46° at right -->
  <path fill="white"
    d="M 51.4 52.0
       A 28 28 0 1 1 51.4 12.0
       L 44.5 19.4
       A 18 18 0 1 0 44.5 44.6
       Z"/>

  <!-- ── Owl ─────────────────────────────────────── -->

  <!-- Body -->
  <ellipse cx="30" cy="44" rx="9.5" ry="10.5" fill="white"/>

  <!-- Head -->
  <circle cx="30" cy="27" r="12" fill="white"/>

  <!-- Ear tufts -->
  <polygon points="22,16  19.5,25.5  25,25" fill="white"/>
  <polygon points="38,16  35,25     40.5,25.5" fill="white"/>

  <!-- Eyes -->
  <circle cx="24.5" cy="27" r="5.2" fill="#4f46e5"/>
  <circle cx="35.5" cy="27" r="5.2" fill="#4f46e5"/>
  <circle cx="26"   cy="25.2" r="2"   fill="white"/>
  <circle cx="37"   cy="25.2" r="2"   fill="white"/>

  <!-- Beak -->
  <polygon points="28.5,32.5 31.5,32.5 30,36.5" fill="#f59e0b"/>

  <!-- Wing dividers: indigo lines separating wings from body, creating owl silhouette -->
  <path d="M 20.5,40 C 18,43.5 18.5,48 21,51" fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 39.5,40 C 42,43.5 41.5,48 39,51" fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Belly scallop line -->
  <path d="M 22.5,39 Q 30,43 37.5,39" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Talons -->
  <path d="M 24.5,53 C 26.5,55.5 30,54.5 30,54.5 C 30,54.5 33.5,55.5 35.5,53"
        fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
</svg>
