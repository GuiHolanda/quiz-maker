homepage.testimonials.title=Resultados reais de engenheiros reais
homepage.testimonials.quote1=Reprovei no meu exame AWS Solutions Architect duas vezes usando guias de estudo tradicionais. Com o AIQuiz passei na terceira tentativa \u2014 a pondera\u00E7\u00E3o por t\u00F3picos fez toda a diferen\u00E7a. Eu sabia exatamente onde estava fraco.
homepage.testimonials.role1=Cloud Engineer \u00B7 Accenture
homepage.testimonials.quote2=Como l\u00EDder de equipe, uso o AIQuiz para preparar toda a minha equipe para certifica\u00E7\u00F5es Azure antes dos engajamentos com clientes. A possibilidade de configurar t\u00F3picos personalizados significa que podemos focar no que cada projeto realmente exige.
homepage.testimonials.role2=DevOps Lead \u00B7 Capgemini
homepage.testimonials.quote3=As explica\u00E7\u00F5es s\u00E3o o diferencial. Cada resposta errada ensina o conceito subjacente, n\u00E3o s\u00F3 a letra certa. Passei no CKA de primeira e as explica\u00E7\u00F5es foram uma parte enorme disso.
