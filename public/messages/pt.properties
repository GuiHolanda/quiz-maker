homepage.features.subtitle=A maioria das ferramentas te d\u00E1 as mesmas 500 quest\u00F5es em rota\u00E7\u00E3o. O AIQuiz gera quest\u00F5es novas a cada sess\u00E3o \u2014 moldadas ao seu exame, seus t\u00F3picos, suas lacunas.
homepage.features.ai.heading=IA que conhece o exame
homepage.features.ai.body=As quest\u00F5es s\u00E3o geradas por um LLM ajustado nos objetivos reais do exame. Cada sess\u00E3o \u00E9 \u00FAnica \u2014 sem bancos reciclados, sem quest\u00F5es repetidas, sem atalhos.
homepage.features.topics.heading=Pr\u00E1tica ponderada por t\u00F3pico
homepage.features.topics.body=Configure exatamente quanto cada dom\u00EDnio contribui para o seu quiz. Dedique mais tempo a Gest\u00E3o de Identidade e Acesso e menos a cobran\u00E7a \u2014 assim como no exame real.
homepage.features.answers.heading=Entenda cada resposta
homepage.features.answers.body=Cada quest\u00E3o vem com explica\u00E7\u00F5es por op\u00E7\u00E3o para voc\u00EA aprender o racioc\u00EDnio, n\u00E3o s\u00F3 a letra. Revise seus resultados instantaneamente ap\u00F3s cada quiz.
