pricing.faq.title=Dúvidas frequentes
pricing.faq.q1=Posso cancelar a qualquer momento?
pricing.faq.a1=Sim. Você pode cancelar sua assinatura a qualquer momento. O acesso continua até o fim do período de cobrança atual.
pricing.faq.q2=O que acontece quando atinjo o limite de questões?
pricing.faq.a2=Ao atingir o limite mensal, a geração de questões é pausada até o próximo período (30 dias após a primeira geração).
pricing.faq.q3=Há trial gratuito para o Pro ou Pro AI?
pricing.faq.a3=Não há trial, mas o plano Gratuito oferece 250 questões para você experimentar a plataforma antes de fazer upgrade.
pricing.faq.q4=Quais formas de pagamento são aceitas?
pricing.faq.a4=Aceitamos cartões de crédito e débito (Visa, Mastercard, American Express) via LemonSqueezy, nosso provedor de pagamentos.
pricing.faq.q5=Qual a diferença entre Pro e Pro AI?
pricing.faq.a5=O Pro AI inclui o assistente AI Chat — um assistente conversacional para dúvidas sobre os tópicos do exame — e acesso a 5 concursos públicos.
pricing.cta2.title=Comece a se preparar de forma mais inteligente hoje
pricing.cta2.subtitle=Junte-se a milhares de profissionais que usam IA para passar em certificações com mais rapidez.
pricing.cta2.button=Comece grátis
