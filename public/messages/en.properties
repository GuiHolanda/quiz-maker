pricing.faq.title=Frequently asked questions
pricing.faq.q1=Can I cancel at any time?
pricing.faq.a1=Yes. You can cancel your subscription at any time. Your access will continue until the end of the current billing period.
pricing.faq.q2=What happens when I reach the question limit?
pricing.faq.a2=Once your monthly limit is reached, question generation is paused until your next period starts (30 days from your first generation).
pricing.faq.q3=Is there a free trial for Pro or Pro AI?
pricing.faq.a3=There is no free trial, but the Free plan gives you 250 questions to experience the platform before upgrading.
pricing.faq.q4=What payment methods are accepted?
pricing.faq.a4=We accept credit and debit cards (Visa, Mastercard, American Express) via Stripe, our payment provider.
pricing.faq.q5=What is the difference between Pro and Pro AI?
pricing.faq.a5=Pro AI includes the AI Chat assistant — a conversational assistant you can ask about exam topics — and access to 5 concurso público exams.
